# Pre-registration artifact — Theory Copilot Phase F
#
# Committed once and never modified. Any subsequent edit of this file
# invalidates the pre-registration (verifiable via `git log -p <file>`).
# This file is the machine-readable form of the FDA-EMA 2026-01 'credibility
# assessment plan' applied to a single symbolic-regression hypothesis.

hypothesis_id: phi1_h2_prop1_top2a_mki67_epas1_vegfa
emitted_at_utc: 2026-04-23T14:58:49Z
emitted_git_sha: f3072e61a747
retroactive: false
analyst: theory-copilot-team
data_cutoff_date: 2026-04-23
dataset_context: kirc_metastasis_expanded

law_family_name: 'PhI-1 prospective test of H2 proposal #1 (double HIF anti-marker)'
template_id: phi1_h2_prop1_top2a_mki67_epas1_vegfa
symbolic_template: 'log1p(exp(TOP2A + MKI67 - EPAS1 - VEGFA))'
initial_guess: 'log1p(exp(TOP2A + MKI67 - EPAS1 - VEGFA))'
biological_rationale: "Proposed by Opus 4.7 in the H2 1M-context synthesis call (2026-04-23, results/overhang/synthesis_1m.json rank 1). Rationale from Opus: combining two proliferation markers (TOP2A + MKI67) against a double-HIF anti-marker (EPAS1 + VEGFA, where VEGFA is a direct EPAS1 target) was predicted to push delta_baseline from +0.069 to +0.08-0.10 by denoising the HIF component. This pre-registration tests that prediction against the same 5-test gate Opus's input corpus came from."
target_features: ["TOP2A", "MKI67", "EPAS1", "VEGFA"]
negative_control: false

# Expected verdict under the 5-test gate (kept pristine from the
# pre-hackathon law_proposals.json entry).
expected_verdict: UNKNOWN

# Deterministic kill-test thresholds. By default these mirror the
# 5-test binary-classification gate in src/theory_copilot/falsification.py
# (a change to that file invalidates every classification pre-reg).
# When `uses_kill_tests_override: true`, the hypothesis is not a binary
# classification and the tests below are hypothesis-specific (e.g.
# log-rank + hazard-ratio for a survival-analysis replay).
uses_kill_tests_override: false
kill_tests:
  - name: label_shuffle_null
    statistic: two_sided_perm_p_bh_fdr
    threshold: < 0.05
    n_permutations: 1000
  - name: bootstrap_stability
    statistic: ci95_lower_bound_on_auroc
    threshold: > 0.6
    n_resamples: 1000
  - name: baseline_comparison
    statistic: law_auroc_minus_max_sign_inv_single_gene_auroc
    threshold: > 0.05
  - name: confound_only
    statistic: auroc(LR(cov+law))_minus_auroc(LR(cov))
    threshold: > 0.03
  - name: decoy_feature_test
    statistic: p_vs_100_random_matched_scale_features
    threshold: < 0.05

multiple_testing_correction: benjamini_hochberg_fdr
alpha: 0.05
stopping_rule: |
  Stop as soon as the 5-test gate returns a verdict (PASS/FAIL). No
  post-hoc threshold adjustment, no re-analysis under new thresholds,
  no cherry-picking a different p-value correction.

# Tamper-evidence pointers.
references:
